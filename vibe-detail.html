<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI产品应用 - 案例详情</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .detail-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 24px;
        }
        
        .detail-header {
            margin-bottom: 32px;
        }
        
        .detail-title {
            font-family: var(--font-display);
            font-size: 2.2rem;
            color: var(--text);
            margin-bottom: 16px;
            line-height: 1.3;
        }
        
        .detail-meta {
            display: flex;
            gap: 20px;
            color: var(--text-3);
            font-size: 0.9rem;
        }
        
        .detail-content {
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text);
        }
        
        .detail-content h1,
        .detail-content h2,
        .detail-content h3 {
            font-family: var(--font-display);
            margin: 24px 0 12px;
            color: var(--text);
        }
        
        .detail-content h1 { font-size: 1.8rem; }
        .detail-content h2 { font-size: 1.5rem; }
        .detail-content h3 { font-size: 1.3rem; }
        
        .detail-content p {
            margin: 12px 0;
        }
        
        .detail-content ul,
        .detail-content ol {
            margin: 12px 0;
            padding-left: 24px;
        }
        
        .detail-content li {
            margin: 6px 0;
        }
        
        .detail-content blockquote {
            border-left: 4px solid var(--accent);
            padding-left: 16px;
            margin: 16px 0;
            color: var(--text-2);
            font-style: italic;
        }
        
        .detail-content pre {
            background: var(--surface);
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-break: break-all;
            border: 1px solid var(--border);
        }
        
        .detail-content code {
            background: var(--accent-soft);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9rem;
        }
        
        .detail-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 16px 0;
        }
        
        .detail-content a {
            color: var(--accent);
            text-decoration: none;
        }
        
        .detail-content a:hover {
            text-decoration: underline;
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-2);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 24px;
            transition: color 0.2s;
        }
        
        .back-btn:hover {
            color: var(--accent);
        }
        
        .back-btn svg {
            width: 18px;
            height: 18px;
        }
        
        .not-found {
            text-align: center;
            padding: 64px 0;
        }
        
        .not-found svg {
            width: 64px;
            height: 64px;
            fill: var(--text-3);
            margin: 0 auto 16px;
        }
    </style>
</head>
<body>
    <div class="detail-container">
        <a href="vibe.html" class="back-btn">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            返回案例列表
        </a>
        
        <article id="caseDetail">
            <!-- 案例详情将在这里渲染 -->
        </article>
    </div>

    <footer>
        <p>© 2025 王瑾 · 知行工坊 · AI产品应用实践</p>
    </footer>

    <script src="scripts/theme.js"></script>
    <script>
        // 加载案例详情
        function loadCaseDetail() {
            const caseId = sessionStorage.getItem('selectedCaseId');
            
            if (!caseId) {
                document.getElementById('caseDetail').innerHTML = `
                    <div class="not-found">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                        <p style="font-size: 1.1rem; color: var(--text-2); margin-bottom: 8px;">案例未找到</p>
                        <p style="font-size: 0.9rem; color: var(--text-3);">请从案例列表中选择一个案例</p>
                    </div>
                `;
                return;
            }
            
            const cases = JSON.parse(localStorage.getItem('vibeCases') || '[]');
            const caseItem = cases.find(c => c.id === caseId);
            
            if (!caseItem) {
                document.getElementById('caseDetail').innerHTML = `
                    <div class="not-found">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                        <p style="font-size: 1.1rem; color: var(--text-2); margin-bottom: 8px;">案例不存在或已被删除</p>
                        <p style="font-size: 0.9rem; color: var(--text-3);"><a href="vibe.html">返回案例列表</a></p>
                    </div>
                `;
                return;
            }
            
            document.getElementById('caseDetail').innerHTML = `
                <header class="detail-header">
                    <h1 class="detail-title">${caseItem.title}</h1>
                    <div class="detail-meta">
                        <span>发布于 ${caseItem.createdAt}</span>
                        <span>更新于 ${caseItem.updatedAt}</span>
                    </div>
                </header>
                <div class="detail-content">${caseItem.content}</div>
            `;
        }
        
        // 页面加载时加载案例详情
        document.addEventListener('DOMContentLoaded', loadCaseDetail);
    </script>
</body>
</html>
