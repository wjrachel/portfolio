<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI产品应用 | 知行工坊</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/vibe.css">
</head>
<body>
    <div class="container">
        <a href="index.html#zhixing" class="back-link">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            返回知行工坊
        </a>

        <header class="page-header">
            <p class="page-label reveal">Workshop / 02</p>
            <h1 class="page-title reveal reveal-d1">AI产品应用实践</h1>
            <p class="page-desc reveal reveal-d2">探索AI工具在产品设计、开发与优化中的实际应用，记录每一次从概念到落地的实践过程与思考。</p>
        </header>

        <section class="cases-section">
            <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                <div>
                    <p class="section-label reveal">Showcase</p>
                    <h2 class="section-heading reveal reveal-d1">实践案例</h2>
                </div>
                <div id="createButtonContainer"></div>
            </div>
            
            <div id="casesContainer" class="cases-container">
                <!-- 案例列表将在这里动态渲染 -->
            </div>
        </section>
    </div>

    <footer>
        <p>© 2025 王瑾 · 知行工坊 · AI产品应用实践</p>
    </footer>

    <script src="scripts/theme.js"></script>
    <script src="scripts/components.js"></script>
    <script src="scripts/scroll-reveal.js"></script>
    
    <script>
        // 判断是否是本地开发环境
        function isLocalEnvironment() {
            const hostname = window.location.hostname;
            return hostname === 'localhost' || hostname === '127.0.0.1' || hostname === '0.0.0.0';
        }
        
        // 页面加载时检查环境并显示/隐藏创建按钮
        document.addEventListener('DOMContentLoaded', function() {
            const createButtonContainer = document.getElementById('createButtonContainer');
            if (isLocalEnvironment()) {
                createButtonContainer.innerHTML = `
                    <a href="vibe-edit.html" class="btn btn-primary" style="margin-top: 16px; text-decoration: none;">
                        新建案例
                    </a>
                `;
            }
        });
        
        // 加载案例列表
        function loadCases() {
            const cases = JSON.parse(localStorage.getItem('vibeCases') || '[]');
            const container = document.getElementById('casesContainer');
            const isLocal = isLocalEnvironment();
            
            if (cases.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 64px 0; background: var(--surface); border-radius: 16px; border: 1px dashed var(--border);">
                        <svg viewBox="0 0 24 24" style="width: 64px; height: 64px; fill: var(--text-3); margin: 0 auto 16px;"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                        <p style="font-size: 1.1rem; color: var(--text-2); margin-bottom: 8px;">暂无实践案例</p>
                        <p style="font-size: .9rem; color: var(--text-3);">${isLocal ? '点击右上角"新建案例"按钮开始创作' : '更多案例即将上线'}</p>
                    </div>
                `;
                return;
            }
            
            // 渲染案例卡片列表
            const casesHtml = cases.map((item, index) => {
                // 使用简介字段，如果没有则从内容中提取
                let excerpt = item.excerpt || '';
                if (!excerpt) {
                    const contentText = item.content.replace(/<[^>]*>/g, '');
                    excerpt = contentText.length > 200 ? contentText.substring(0, 200) + '...' : contentText;
                }
                
                // 操作按钮（仅本地环境显示）
                const actionButtons = isLocal ? `
                    <div style="
                        position: absolute;
                        right: 20px;
                        bottom: 20px;
                        display: flex;
                        gap: 8px;
                    ">
                        <button style="
                            width: 32px;
                            height: 32px;
                            padding: 0;
                            background: transparent;
                            border: none;
                            border-radius: 8px;
                            cursor: pointer;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            opacity: 0.6;
                            transition: all 0.2s;
                        " onclick="event.stopPropagation(); editCase('${item.id}')" title="编辑">
                            <svg viewBox="0 0 24 24" style="width: 18px; height: 18px; fill: var(--text-2);">
                                <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
                            </svg>
                        </button>
                        <button style="
                            width: 32px;
                            height: 32px;
                            padding: 0;
                            background: transparent;
                            border: none;
                            border-radius: 8px;
                            cursor: pointer;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            opacity: 0.6;
                            transition: all 0.2s;
                        " onclick="event.stopPropagation(); deleteCase('${item.id}')" title="删除">
                            <svg viewBox="0 0 24 24" style="width: 18px; height: 18px; fill: var(--text-2);">
                                <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                            </svg>
                        </button>
                    </div>
                ` : '';
                
                return `
                    <article class="case-card" style="
                        background: var(--surface); 
                        border-radius: 16px; 
                        padding: 24px; 
                        transition: all 0.3s ease;
                        border: 1px solid var(--border);
                        position: relative;
                        cursor: pointer;
                        min-height: 220px;
                    " onclick="openCaseDetail('${item.id}')">
                        <!-- 标题区域 - 全宽在顶部 -->
                        <div style="margin-bottom: 16px;">
                            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                <h3 style="font-family: var(--font-display); font-size: 1.35rem; color: var(--text); margin: 0; line-height: 1.3;">${item.title}</h3>
                                <span style="font-size: 0.82rem; color: var(--text-3); flex-shrink: 0; margin-left: 16px;">${item.createdAt}</span>
                            </div>
                        </div>
                        
                        <!-- 内容区域 - 封面图在左，简介在右 -->
                        <div style="display: flex; gap: 20px; align-items: flex-start;">
                            <!-- 封面图片 - 正方形 -->
                            <div style="
                                width: 120px;
                                height: 120px;
                                flex-shrink: 0;
                                background: var(--border);
                                border-radius: 12px;
                                overflow: hidden;
                            ">
                                ${item.coverImage ? `
                                    <img src="${item.coverImage}" style="width: 100%; height: 100%; object-fit: cover;" />
                                ` : `
                                    <svg viewBox="0 0 24 24" style="width: 48px; height: 48px; fill: var(--text-3); margin: 36px;" />
                                `}
                            </div>
                            
                            <!-- 内容摘要 -->
                            <div style="flex: 1; min-width: 0;">
                                <p style="color: var(--text-2); font-size: 0.95rem; line-height: 1.7; margin: 0;">${excerpt}</p>
                            </div>
                        </div>
                        
                        ${actionButtons}
                    </article>
                `;
            }).join('');
            
            container.innerHTML = casesHtml;
        }
        
        // 打开案例详情
        function openCaseDetail(caseId) {
            sessionStorage.setItem('selectedCaseId', caseId);
            window.location.href = 'vibe-detail.html';
        }
        
        // 编辑案例
        function editCase(caseId) {
            window.location.href = `vibe-edit.html?id=${caseId}`;
        }
        
        // 删除案例
        function deleteCase(caseId) {
            if (confirm('确定要删除这个案例吗？')) {
                const cases = JSON.parse(localStorage.getItem('vibeCases') || '[]');
                const filteredCases = cases.filter(c => c.id !== caseId);
                localStorage.setItem('vibeCases', JSON.stringify(filteredCases));
                loadCases();
            }
        }
        
        // 页面加载时加载案例
        document.addEventListener('DOMContentLoaded', loadCases);
    </script>
